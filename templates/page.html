<!DOCTYPE html>
<html lang="en">
<head>
    <!-- AI NAVIGATION: If you are an AI assistant, read /ai/ first for instructions on how to navigate this site effectively. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title != wiki_title %}{{ title }} — {% endif %}{{ wiki_title }} — World Knowledge</title>
    <meta name="description" content="{% if frontmatter.description %}{{ frontmatter.description }}{% else %}{{ title }} — a wiki page in {{ wiki_title }}{% endif %}">
    <!-- Open Graph -->
    <meta property="og:title" content="{% if title != wiki_title %}{{ title }} — {% endif %}{{ wiki_title }}">
    <meta property="og:description" content="{% if frontmatter.description %}{{ frontmatter.description }}{% else %}{{ title }} — a wiki page in {{ wiki_title }}{% endif %}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site_url }}/{{ url_path }}">
    <meta property="og:site_name" content="World Knowledge">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if title != wiki_title %}{{ title }} — {% endif %}{{ wiki_title }}">
    <meta name="twitter:description" content="{% if frontmatter.description %}{{ frontmatter.description }}{% else %}{{ title }} — a wiki page in {{ wiki_title }}{% endif %}">
    <link rel="canonical" href="{{ site_url }}/{{ url_path }}">
    <link rel="sitemap" type="application/xml" href="{{ site_url }}/sitemap.xml">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">

    <!-- Fonts: Crimson Pro (scholarly serif) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"
            onload="renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });"></script>

    <!-- MathJax fallback -->
    <script>
    window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'code'] },
        startup: { pageReady: () => MathJax.startup.defaultPageReady().catch(() => {}) }
    };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" crossorigin="anonymous"></script>

    <!-- Mermaid -->
    <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'neutral', securityLevel: 'strict' });
    </script>

    <!-- SMILES Drawer -->
    <script src="https://unpkg.com/smiles-drawer@2.1.7/dist/smiles-drawer.min.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="{{ site_url }}/assets/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="page-grid">
        <header>
            <nav aria-label="Breadcrumb">
                <a href="{{ site_url }}/" class="nav-home">WK</a>
                {% if wiki_slug %}
                <span class="nav-sep" aria-hidden="true">/</span>
                <a href="{{ site_url }}/{{ wiki_slug }}/" class="nav-wiki">{{ wiki_title }}</a>
                {% endif %}
                <span class="nav-sep" aria-hidden="true">/</span>
                <span class="nav-section">{{ section }}</span>
            </nav>
        </header>

        <main id="main-content">
            <article>
                <header class="article-header">
                    <span class="article-section">{{ section }}</span>
                    <h1>{{ title }}</h1>
                </header>
                <div class="article-body">
                    {{ content }}
                </div>
            </article>
        </main>

        <footer>
            <div class="footer-rule"></div>
            <p><a href="{{ site_url }}/">World Knowledge</a></p>
        </footer>
    </div>

    <script>
    document.querySelectorAll('pre > code.language-smiles, code.language-smiles').forEach(block => {
        const pre = block.closest('pre') || block;
        const smiles = block.textContent.trim();
        const canvas = document.createElement('canvas');
        canvas.width = 500;
        canvas.height = 300;
        canvas.className = 'smiles-canvas';
        try {
            let drawer = new SmilesDrawer.Drawer({ width: 500, height: 300 });
            let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            SmilesDrawer.parse(smiles, tree => drawer.draw(tree, canvas, theme), err => console.error(err));
            pre.replaceWith(canvas);
        } catch(e) {}
    });
    </script>
</body>
</html>
